name: Process Secure Submission

# Trigger on PUSH to main, PR events, or manual run
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run the workflow on'
        required: false

permissions:
  contents: write

jobs:
  process-submission:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository (PR-aware)
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.pr_number && 'refs/pull/' + github.event.inputs.pr_number + '/head' || github.head_ref }}
          fetch-depth: 0

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 3️⃣ Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install --upgrade cryptography

      # 4️⃣ Optional: Verify cryptography
      - name: Verify cryptography
        run: |
          python -m pip show cryptography
          python -c "from cryptography.hazmat.primitives import serialization, hashes; print('cryptography OK')"

      # 5️⃣ Debug: list submissions folder
      - name: List submissions folder
        run: |
          echo "DEBUG: Listing submissions folder contents:"
          ls -R submissions || echo "No submissions found"

      # 6️⃣ Run the submission processing script
      - name: Decrypt, Score, and Update Leaderboard
        env:
          SUBMISSION_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          TEST_LABELS_CSV: ${{ secrets.TEST_LABELS_CSV }}
        run: |
          echo "Decrypting and scoring submissions..."
          python .github/scripts/process_submission.py

      # 7️⃣ Commit and push any changes only for pushes to main
      - name: Commit and Push Changes (Main branch only)
        if: github.event_name == 'push'
        run: |
          git config user.name "SubmissionBot"
          git config user.email "bot@noreply.github.com"
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Processed new submission [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
