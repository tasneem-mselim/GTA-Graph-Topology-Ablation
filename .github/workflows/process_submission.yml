name: Process Secure Submission

# Trigger on PUSH to main
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  process-merged-file:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 3️⃣ Install dependencies and cryptography explicitly
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install --upgrade cryptography

      # 4️⃣ Optional: Verify cryptography installation
      - name: Verify cryptography
        run: |
          python -m pip show cryptography
          python -c "from cryptography.hazmat.primitives import serialization, hashes; print('cryptography OK')"

      # 5️⃣ Run the submission processing script
      - name: Find and Process Submission
        env:
          SUBMISSION_PRIVATE_KEY: ${{ secrets.SUBMISSION_PRIVATE_KEY }}
          TEST_LABELS_CSV: ${{secrets.TEST_LABELS_CSV}}
        run: |
          python .github/scripts/process_submission.py

      # 6️⃣ Commit and push any changes
      - name: Commit and Push Changes
        run: |
          git config user.name "SubmissionBot"
          git config user.email "bot@noreply.github.com"
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Processed new submission [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
